<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Login...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-container {
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            padding: 48px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(6, 182, 212, 0.2);
            border-top-color: #06b6d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            color: #e2e8f0;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .status-text {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .error {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .error.show {
            display: block;
        }

        .success {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .success.show {
            display: block;
        }

        .redirect-info {
            display: none;
            color: #64748b;
            font-size: 13px;
            margin-top: 16px;
        }

        .redirect-info.show {
            display: block;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #06b6d4 0%, #0e7490 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3);
        }

        .btn-secondary {
            background: #334155;
        }

        .btn-secondary:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <!-- Loading Spinner -->
        <div id="spinner" class="spinner"></div>

        <!-- Title -->
        <h1 id="title">Verifying your login...</h1>

        <!-- Status Text -->
        <p id="statusText" class="status-text">
            Please wait while we verify your magic link.
        </p>

        <!-- Error Message -->
        <div id="errorMessage" class="error"></div>

        <!-- Success Message -->
        <div id="successMessage" class="success"></div>

        <!-- Redirect Info -->
        <div id="redirectInfo" class="redirect-info">
            Redirecting to dashboard in <span id="countdown">3</span> seconds...
        </div>

        <!-- Action Buttons (hidden by default) -->
        <div id="actions" style="display: none;">
            <a href="/" class="btn">Go to Dashboard</a>
            <a href="https://ai.dodman.group/login" class="btn btn-secondary">Back to Login</a>
        </div>
    </div>

    <script>
        const SESSION_KEY = 'dodman_session_token';
        const REFRESH_KEY = 'dodman_refresh_token';
        const TENANT_KEY  = 'dodman_tenant_id';
        const CORE_API    = 'https://dodman-core.onrender.com';
        const LOGIN_URL   = 'https://ai.dodman.group/login.html';

        // ── Error messages mapped from dodman-core detail strings ────────────────
        const ERROR_MESSAGES = {
            'Magic link has expired':        'This magic link has expired. Please request a new one.',
            'Magic link already used':       'This magic link has already been used. Please request a new one.',
            'Magic link invalid':            'This magic link is invalid. Please request a new one.',
            'Invalid magic link':            'This magic link is invalid. Please request a new one.',
            'Token has expired':             'This magic link has expired. Please request a new one.',
            'Invalid token':                 'This magic link is invalid. Please request a new one.',
        };

        function friendlyError(detail) {
            if (!detail) return 'Verification failed. Please request a new magic link.';
            for (const [key, msg] of Object.entries(ERROR_MESSAGES)) {
                if (detail.includes(key)) return msg;
            }
            return detail;
        }

        // ── Flow 1: Magic link click (/verify?token=...) ─────────────────────────
        // User clicked the email link. We call the verification endpoint ourselves
        // and handle both success (redirect) and error (friendly message) here.
        async function handleMagicLink(token) {
            document.getElementById('statusText').textContent =
                'Verifying your magic link...';

            try {
                const response = await fetch(
                    `${CORE_API}/api/auth/auth/magic?token=${encodeURIComponent(token)}`
                );

                // dodman-core redirects on success — if we're still here it's an error.
                // But in case it returns JSON tokens directly:
                if (response.ok) {
                    const data = await response.json();

                    // If tokens come back directly in JSON
                    if (data.session_token) {
                        sessionStorage.setItem(SESSION_KEY, data.session_token);
                        if (data.refresh_token) sessionStorage.setItem(REFRESH_KEY, data.refresh_token);
                        if (data.tenant_id)     sessionStorage.setItem(TENANT_KEY, data.tenant_id);
                        if (data.subdomain)     sessionStorage.setItem('dodman_subdomain', data.subdomain);
                        showSuccess();
                        return;
                    }

                    // If it redirects via a redirect_url field
                    if (data.redirect_url) {
                        window.location.href = data.redirect_url;
                        return;
                    }
                }

                // Error response — parse and show friendly message
                let detail = 'Verification failed. Please request a new magic link.';
                try {
                    const err = await response.json();
                    detail = err.detail || err.message || detail;
                } catch { /* response wasn't JSON */ }

                showError(friendlyError(detail));

            } catch (error) {
                console.error('Magic link verification error:', error);
                showError('Network error. Please check your connection and try again.');
            }
        }

        // ── Flow 2: Post-verification callback (/auth/callback?session_token=...) ─
        // dodman-core redirected here after verifying the token server-side.
        // We just store the tokens and redirect to the dashboard.
        function handleCallback() {
            const params       = new URLSearchParams(window.location.search);
            const sessionToken = params.get('session_token');
            const refreshToken = params.get('refresh_token');
            const tenantId     = params.get('tenant_id');
            const subdomain    = params.get('subdomain');
            const error        = params.get('error');

            // dodman-core can also redirect here with an error param
            if (error) {
                showError(friendlyError(decodeURIComponent(error)));
                return;
            }

            if (!sessionToken) {
                showError('No session token received. Please request a new magic link.');
                return;
            }

            sessionStorage.setItem(SESSION_KEY, sessionToken);
            if (refreshToken) sessionStorage.setItem(REFRESH_KEY, refreshToken);
            if (tenantId)     sessionStorage.setItem(TENANT_KEY, tenantId);
            if (subdomain)    sessionStorage.setItem('dodman_subdomain', subdomain);

            window.history.replaceState({}, document.title, '/auth/callback');
            showSuccess();
        }

        function showSuccess() {
            // Decode token for welcome name
            let userName = 'there';
            try {
                const token   = sessionStorage.getItem(SESSION_KEY);
                const base64  = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(atob(base64));
                const prefix  = (payload.email || '').split('@')[0];
                userName = prefix
                    .replace(/[._-]/g, ' ')
                    .replace(/\b\w/g, c => c.toUpperCase())
                    || 'there';
            } catch { /* ignore */ }

            document.getElementById('spinner').style.display  = 'none';
            document.getElementById('title').textContent      = '✓ Login Successful!';
            document.getElementById('statusText').textContent = `Welcome back, ${userName}!`;

            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = 'Your session has been created. Redirecting to dashboard...';
            successMsg.classList.add('show');

            const redirectInfo = document.getElementById('redirectInfo');
            redirectInfo.classList.add('show');

            let countdown = 3;
            const countdownEl = document.getElementById('countdown');
            const timer = setInterval(() => {
                countdown--;
                countdownEl.textContent = countdown;
                if (countdown === 0) {
                    clearInterval(timer);
                    window.location.replace('/');
                }
            }, 1000);
        }

        function showError(message) {
            document.getElementById('spinner').style.display      = 'none';
            document.getElementById('title').textContent          = 'Verification Failed';
            document.getElementById('statusText').style.display   = 'none';

            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');

            // Show a "Request new link" button that goes back to login
            const actions = document.getElementById('actions');
            actions.innerHTML = `
                <a href="${LOGIN_URL}" class="btn">Request New Link</a>
            `;
            actions.style.display = 'block';
        }

        // ── Router: decide which flow based on URL ────────────────────────────────
        (function init() {
            const params = new URLSearchParams(window.location.search);
            const token  = params.get('token');

            if (token) {
                // Magic link click — verify it ourselves
                handleMagicLink(token);
            } else {
                // Post-verification callback from dodman-core
                handleCallback();
            }
        })();
    </script>
</body>
</html>
