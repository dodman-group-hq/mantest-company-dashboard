<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Login...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-container {
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            padding: 48px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(6, 182, 212, 0.2);
            border-top-color: #06b6d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            color: #e2e8f0;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .status-text {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .error {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .error.show {
            display: block;
        }

        .success {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .success.show {
            display: block;
        }

        .redirect-info {
            display: none;
            color: #64748b;
            font-size: 13px;
            margin-top: 16px;
        }

        .redirect-info.show {
            display: block;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #06b6d4 0%, #0e7490 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3);
        }

        .btn-secondary {
            background: #334155;
        }

        .btn-secondary:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <!-- Loading Spinner -->
        <div id="spinner" class="spinner"></div>

        <!-- Title -->
        <h1 id="title">Verifying your login...</h1>

        <!-- Status Text -->
        <p id="statusText" class="status-text">
            Please wait while we verify your magic link.
        </p>

        <!-- Error Message -->
        <div id="errorMessage" class="error"></div>

        <!-- Success Message -->
        <div id="successMessage" class="success"></div>

        <!-- Redirect Info -->
        <div id="redirectInfo" class="redirect-info">
            Redirecting to dashboard in <span id="countdown">3</span> seconds...
        </div>

        <!-- Action Buttons (hidden by default) -->
        <div id="actions" style="display: none;">
            <a href="/" class="btn">Go to Dashboard</a>
            <a href="https://ai.dodman.group/login" class="btn btn-secondary">Back to Login</a>
        </div>
    </div>

    <script>
        // ── Token storage ────────────────────────────────────────────────────
        const SESSION_KEY = 'dodman_session_token';
        const REFRESH_KEY = 'dodman_refresh_token';
        const TENANT_KEY  = 'dodman_tenant_id';

        // ── This page serves as /auth/callback ───────────────────────────────
        // dodman-core redirects here after magic link verification with tokens
        // in the query string. We store them and redirect to the dashboard.
        function handleCallback() {
            const params        = new URLSearchParams(window.location.search);
            const sessionToken  = params.get('session_token');
            const refreshToken  = params.get('refresh_token');
            const tenantId      = params.get('tenant_id');
            const subdomain     = params.get('subdomain');

            if (!sessionToken || !refreshToken) {
                showError('No session tokens received. Please request a new magic link.');
                return;
            }

            // Store tokens in sessionStorage
            sessionStorage.setItem(SESSION_KEY, sessionToken);
            sessionStorage.setItem(REFRESH_KEY, refreshToken);
            if (tenantId)   sessionStorage.setItem(TENANT_KEY, tenantId);
            if (subdomain)  sessionStorage.setItem('dodman_subdomain', subdomain);

            // Decode token to get user info for welcome message
            let userName = 'there';
            try {
                const base64  = sessionToken.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(atob(base64));
                userName = payload.email ? payload.email.split('@')[0] : 'there';
            } catch (e) { /* ignore decode errors */ }

            // Strip tokens from URL so they don't appear in browser history
            window.history.replaceState({}, document.title, '/auth/callback');

            // Show success and redirect
            showSuccess({ user: { name: userName } });
        }

        // Show success and redirect to dashboard home
        function showSuccess(data) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = '✓ Login Successful!';
            document.getElementById('statusText').textContent =
                `Welcome back, ${data.user.name || 'there'}!`;

            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = 'Your session has been created. Redirecting to dashboard...';
            successMsg.classList.add('show');

            const redirectInfo = document.getElementById('redirectInfo');
            redirectInfo.classList.add('show');

            let countdown = 3;
            const countdownEl = document.getElementById('countdown');

            const timer = setInterval(() => {
                countdown--;
                countdownEl.textContent = countdown;
                if (countdown === 0) {
                    clearInterval(timer);
                    window.location.replace('/');
                }
            }, 1000);
        }

        // Show error state
        function showError(message) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Verification Failed';
            document.getElementById('statusText').style.display = 'none';

            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');

            document.getElementById('actions').style.display = 'block';
        }

        // Run on page load
        handleCallback();
    </script>
</body>
</html>
