<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Login...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-container {
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            padding: 48px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(6, 182, 212, 0.2);
            border-top-color: #06b6d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            color: #e2e8f0;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .status-text {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .error {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .error.show {
            display: block;
        }

        .success {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .success.show {
            display: block;
        }

        .redirect-info {
            display: none;
            color: #64748b;
            font-size: 13px;
            margin-top: 16px;
        }

        .redirect-info.show {
            display: block;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #06b6d4 0%, #0e7490 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3);
        }

        .btn-secondary {
            background: #334155;
        }

        .btn-secondary:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <!-- Loading Spinner -->
        <div id="spinner" class="spinner"></div>

        <!-- Title -->
        <h1 id="title">Verifying your login...</h1>

        <!-- Status Text -->
        <p id="statusText" class="status-text">
            Please wait while we verify your magic link.
        </p>

        <!-- Error Message -->
        <div id="errorMessage" class="error"></div>

        <!-- Success Message -->
        <div id="successMessage" class="success"></div>

        <!-- Redirect Info -->
        <div id="redirectInfo" class="redirect-info">
            Redirecting to dashboard in <span id="countdown">3</span> seconds...
        </div>

        <!-- Action Buttons (hidden by default) -->
        <div id="actions" style="display: none;">
            <a href="/" class="btn">Go to Dashboard</a>
            <a href="https://dodman.ai/login" class="btn btn-secondary">Back to Login</a>
        </div>
    </div>

    <script>
        // Configuration
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api'
            : '/api';

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // Verify token on page load
        async function verifyMagicLink() {
            // Check if token exists
            if (!token) {
                showError('No verification token found in URL. Please request a new magic link.');
                return;
            }

            try {
                // Call verify endpoint
                const response = await fetch(`${API_URL}/auth/verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include', // Important: Include cookies
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Handle error
                    if (response.status === 401) {
                        showError('This magic link has expired or is invalid. Please request a new one.');
                    } else {
                        showError(data.detail || 'Verification failed. Please try again.');
                    }
                    return;
                }

                // Success!
                showSuccess(data);

            } catch (error) {
                console.error('Verification error:', error);
                showError('Network error. Please check your connection and try again.');
            }
        }

        // Show success and redirect
        function showSuccess(data) {
            // Hide spinner
            document.getElementById('spinner').style.display = 'none';

            // Update title
            document.getElementById('title').textContent = '✓ Login Successful!';

            // Update status
            document.getElementById('statusText').textContent = 
                `Welcome back, ${data.user.name || data.user.email}!`;

            // Show success message
            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = 'Your session has been created. Redirecting to dashboard...';
            successMsg.classList.add('show');

            // Show redirect countdown
            const redirectInfo = document.getElementById('redirectInfo');
            redirectInfo.classList.add('show');

            // Countdown and redirect
            let countdown = 3;
            const countdownEl = document.getElementById('countdown');
            
            const timer = setInterval(() => {
                countdown--;
                countdownEl.textContent = countdown;
                
                if (countdown === 0) {
                    clearInterval(timer);
                    // Redirect to dashboard home
                    window.location.href = '/';
                }
            }, 1000);
        }

        // Show error
        function showError(message) {
            // Hide spinner
            document.getElementById('spinner').style.display = 'none';

            // Update title
            document.getElementById('title').textContent = 'Verification Failed';

            // Hide status text
            document.getElementById('statusText').style.display = 'none';

            // Show error message
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');

            // Show action buttons
            document.getElementById('actions').style.display = 'block';
        }

        // Run verification on page load
        verifyMagicLink();
    </script>
</body>
</html>
